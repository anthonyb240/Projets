version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/db
    environment:
      DB_PATH: /app/db/app.db
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  db:
    image: sublimesec/bora-lite
    volumes:
      - sqlite_data:/data

volumes:
  sqlite_data: