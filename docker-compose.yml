services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-securisee:latest
    environment:
      SECRET_KEY: ${SECRET_KEY:-ci-test-secret-key}
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    expose:
      - "5000"
    deploy: 
      replicas: 2

  nginx:
    image: nginx:alpine
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped