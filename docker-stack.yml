version: '3.8'

services:
  # ─── OpenBao backend (mode dev) ───
  openbao:
    image: openbao/openbao:latest
    networks:
      - frontend
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ─── Agent OpenBao (rend secrets sur volume) ───
  bao-agent:
    image: openbao/openbao:latest
    networks:
      - frontend
    user: "0:0"
    volumes:
      - ./openbao:/etc/openbao:ro
      - ./rendered:/run/secrets-rendered
    command: ["bao", "agent", "-config=/etc/openbao/agent.hcl"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ─── Forum app (×2 replicas) ───
  app:
    image: ghcr.io/anthonyb240/projets:latest
    networks:
      - frontend
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      SECRETS_FILE: /run/secrets-rendered/app.env
      SECRETS_TTL: "15"
    volumes:
      - ./rendered:/run/secrets-rendered:ro
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Nginx reverse proxy ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

  # ─── Uptime Kuma monitoring ───
  uptime-kuma:
    image: louislam/uptime-kuma:2
    ports:
      - "3001:3001"
    networks:
      - frontend
    volumes:
      - uptime-kuma:/app/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  uptime-kuma:

networks:
  frontend:
    driver: overlay
    attachable: true
