version: '3.8'

services:
  # ─── OpenBao backend (mode server, persistent file storage) ───
  openbao:
    image: openbao/openbao:latest
    user: "0:0"
    command: >
      sh -lc "mkdir -p /openbao/data &&
              chown -R openbao:openbao /openbao/data &&
              exec docker-entrypoint.sh server -config=/openbao/config/config.hcl"
    networks:
      - frontend
    environment:
      BAO_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    volumes:
      - openbao-data:/openbao/data
      - ./openbao/config.hcl:/openbao/config/config.hcl:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ─── Agent OpenBao (rend secrets sur volume) ───
  bao-agent:
    image: openbao/openbao:latest
    networks:
      - frontend
    user: "0:0"
    environment:
      BAO_ADDR: http://openbao:8200
    volumes:
      - ./openbao:/etc/openbao:ro
      - ./rendered:/run/secrets-rendered
    command: ["bao", "agent", "-config=/etc/openbao/agent.hcl"]
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ─── Forum app - BLUE (Default) ───
  app:
    image: ghcr.io/anthonyb240/projets:latest
    networks:
      - frontend
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      SECRETS_FILE: /run/secrets-rendered/app.env
      SECRETS_TTL: "15"
    volumes:
      - ./rendered:/run/secrets-rendered:ro
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      healthcheck:
        test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 30s

  # ─── Forum app - GREEN ───
  app_green:
    image: ghcr.io/anthonyb240/projets:latest
    networks:
      - frontend
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      SECRETS_FILE: /run/secrets-rendered/app.env
      SECRETS_TTL: "15"
    volumes:
      - ./rendered:/run/secrets-rendered:ro
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      healthcheck:
        test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 30s

  # ─── Nginx reverse proxy ───
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ─── Uptime Kuma monitoring ───
  uptime-kuma:
    image: louislam/uptime-kuma:2
    ports:
      - "3001:3001"
    networks:
      - frontend
    volumes:
      - uptime-kuma:/app/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  uptime-kuma:
  openbao-data:

networks:
  frontend:
    driver: overlay
    attachable: true