version: '3.8'

services:
  app:
    image: ghcr.io/anthonyb240/projets:latest
    networks:
      - frontend
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      SECRETS_FILE: /run/secrets-rendered/app.env
      SECRETS_TTL: "15"
    volumes:
      - ./rendered:/run/secrets-rendered:ro
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  frontend:
    driver: overlay