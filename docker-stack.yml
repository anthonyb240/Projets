version: '3.8'

services:
  app:
    # Source unique : le registre GitHub
    image: ${DOCKER_IMAGE:-ghcr.io/anthonyb240/projets:latest}
    networks:
      - frontend
    environment:
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      # Chemin flexible pour lire les secrets (compatible avec votre volume OU les secrets Swarm)
      SECRETS_FILE: ${SECRETS_FILE:-/run/secrets/app_secret}
      SECRETS_TTL: "15"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    secrets:
      - source: app_secret_v1
        target: app_secret
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
  
  uptime-kuma:
    image: louislam/uptime-kuma:2
    ports:
      - "3001:3001"
    networks:
      - frontend
    volumes:
      - uptime-kuma:/app/data
    deploy:
      replicas: 1

volumes:
  uptime-kuma:

networks:
  frontend:
    driver: overlay

secrets:
  app_secret_v1:
    external: true