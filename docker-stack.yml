version: '3.8'

services:
  app:
    image: app-securisee:latest
    networks:
      - frontend
    environment:
      # On peut toujours utiliser des variables d'env pour les configs non sensibles
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
      # On indique au secrets_manager de chercher dans le dossier des secrets Swarm
      SECRETS_FILE: /run/secrets/app_secret
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
    secrets:
      - source: app_secret_v1
        target: app_secret
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  frontend:
    driver: overlay

secrets:
  app_secret_v1:
    external: true
