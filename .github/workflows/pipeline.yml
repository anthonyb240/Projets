name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ============================================================
  # Job 0 : Detecter les changements de fichiers Python
  # (Lab 5 : CI/CD intelligente - ne lancer que si necessaire)
  # ============================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements.txt'
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - '.dockerignore'

  # ============================================================
  # Lab 1 : Qualite & Secrets (jobs paralleles)
  # ============================================================

  # Job 1a : Detection de secrets avec Gitleaks (+ custom regex)
  gitleaks:
    name: Gitleaks - Detection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  # Job 1b : Detection de secrets avec TruffleHog (alternative)
  trufflehog:
    name: TruffleHog - Detection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          extra_args: --only-verified

  # Job 1c : Lint Python avec Flake8
  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Installation de flake8
        run: pip install flake8

      - name: Lancement du linting
        run: flake8 . --max-line-length=120 --statistics

  # ============================================================
  # Lab 2 : SAST & SCA (paralleles, apres lint)
  # ============================================================

  # Job 2a : SAST avec Bandit
  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit

      - name: Installation de Bandit
        run: pip install bandit

      - name: Lancement Bandit
        run: bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git || true

      - name: Sauvegarde du rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # Job 2b : SAST avec Semgrep (bonus Lab 2 + challenge policy-as-code)
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep

      - name: Installation de Semgrep
        run: pip install semgrep

      - name: Scan Semgrep (regles par defaut)
        run: semgrep scan --config auto --json --output semgrep-default-report.json . || true

      - name: Scan Semgrep (regles custom - policy as code)
        run: semgrep scan --config .semgrep/custom-rules.yml --json --output semgrep-custom-report.json . || true

      - name: Sauvegarde des rapports Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-default-report.json
            semgrep-custom-report.json

  # Job 2c : SCA avec pip-audit
  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit

      - name: Installation de pip-audit
        run: pip install pip-audit

      - name: Scan des dependances
        run: pip-audit -r requirements.txt

  # ============================================================
  # Lab 3 : Docker & Image Security
  # ============================================================

  # Job 3a : Scan pre-build du Dockerfile avec Trivy (filesystem)
  trivy-fs:
    name: Trivy - Scan pre-build (filesystem)
    runs-on: ubuntu-latest
    needs: [sast-bandit, sast-semgrep, sca]
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-fs-report.txt

      - name: Sauvegarde du rapport Trivy FS
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  # Job 3b : Build Docker + Scan image avec Trivy (post-build)
  docker-build-scan:
    name: Docker - Build & Trivy scan image
    runs-on: ubuntu-latest
    needs: [trivy-fs, changes]
    if: |
      always() &&
      !contains(needs.trivy-fs.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build \
            --secret id=ctf_flag,src=<(echo "FLAG{test_ci_cd}") \
            --secret id=db_password,src=<(echo "ci_test_password") \
            --secret id=api_key,src=<(echo "ci_test_api_key") \
            -t app-securisee:${{ github.sha }} .

      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "app-securisee:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-image-report.txt

      - name: Sauvegarde du rapport Trivy Image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ============================================================
  # Lab 4 : DAST & Deploy
  # ============================================================

  # Job 4a : DAST avec Nikto
  dast-nikto:
    name: DAST - Nikto
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dependances
        run: pip install -r requirements.txt

      - name: Demarrage de l'application
        run: |
          export SECRET_KEY="ci-test-secret-key-for-nikto"
          export SQLALCHEMY_DATABASE_URI="sqlite:///ci_test.db"
          python -c "from app import app; from models import db; app.app_context().push(); db.create_all()"
          gunicorn --bind 0.0.0.0:5000 --timeout 120 --daemon app:app
          echo "Attente du demarrage..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Serveur pret !"
              break
            fi
            echo "Tentative $i/30..."
            sleep 2
          done

      - name: Scan DAST avec Nikto
        run: |
          mkdir -p reports
          docker run --rm --network host \
            secfigo/nikto:latest \
            -h http://localhost:5000 \
            -Format csv -output /dev/stdout \
            -Tuning 1 2 3 4 5 6 7 8 9 0 > reports/nikto-report.csv || true

      - name: Sauvegarde du rapport Nikto
        uses: actions/upload-artifact@v4
        with:
          name: nikto-report
          path: reports/nikto-report.csv

  # Job 4b : Push vers DockerHub
  docker-push:
    name: Deploy - Push DockerHub
    runs-on: ubuntu-latest
    needs: [dast-nikto]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push
        run: |
          docker build \
            --secret id=ctf_flag,src=<(echo "${{ secrets.CTF_FLAG }}") \
            --secret id=db_password,src=<(echo "${{ secrets.DB_PASSWORD }}") \
            --secret id=api_key,src=<(echo "${{ secrets.API_KEY }}") \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/app-securisee:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/app-securisee:${{ github.sha }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-securisee:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app-securisee:${{ github.sha }}
