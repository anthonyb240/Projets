name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # 0. Detection des changements
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python: ['**/*.py', 'requirements.txt', 'Dockerfile']

  # 1. Scans de Securite de base (Parallele)
  security-scans:
    name: Base Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Gitleaks, TruffleHog, etc. (Simplifié pour la lisibilité ici, gardez vos étapes si besoin)
      - name: Security Check
        run: echo "Basic scans passed"

  # 2. CONSTRUCTION UNIQUE ET PUBLICATION
  # C'est l'étape clé : on fabrique l'image UNE SEULE FOIS
  docker-build-push:
    name: Build & Push to GHCR
    needs: [security-scans, changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Build and Push
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --secret id=db_password,src=<(echo "${{ secrets.DB_PASSWORD }}") \
            --secret id=api_key,src=<(echo "${{ secrets.API_KEY }}") \
            -t ghcr.io/$REPO_LOWER:latest \
            -t ghcr.io/$REPO_LOWER:${{ github.sha }} .
          docker push ghcr.io/$REPO_LOWER:latest
          docker push ghcr.io/$REPO_LOWER:${{ github.sha }}

  # 3. TESTS DAST (Utilise l'image GitHub)
  dast-test:
    name: DAST Security Test
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swarm Init + Secret
        run: |
          docker swarm init || true
          echo "SECRET_KEY=ci-test-key" | docker secret create app_secret_v1 - || true
      
      - name: Deploy & Scan
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
        run: |
          # On utilise l'image qu'on vient de pusher
          export DOCKER_IMAGE=$(echo "$DOCKER_IMAGE" | tr '[:upper:]' '[:lower:]')
          docker stack deploy -c docker-stack.yml my_app
          
          echo "Attente du demarrage..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost > /dev/null 2>&1; then echo "OK"; break; fi
            sleep 2
          done
          # (Ici vous remettrez votre étape Wapiti complète)
          docker stack rm my_app

  # 4. INTEGRATION OPENBAO (Utilise l'image GitHub)
  swarm-bao-integration:
    name: Swarm + OpenBao Integration
    needs: [docker-build-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup & Test
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}
        run: |
          export DOCKER_IMAGE=$(echo "$DOCKER_IMAGE" | tr '[:upper:]' '[:lower:]')
          docker swarm init || true
          # Simulation d'un secret rendu par Bao
          mkdir -p rendered && echo "API_KEY=test" > rendered/app.env
          docker secret create app_secret_v1 rendered/app.env
          docker stack deploy -c docker-stack.yml my_app
          # ... reste de vos tests Bao ...
          docker stack rm my_app

  # 5. DEPLOIEMENT FINAL (Local Swarm)
  swarm-deploy:
    name: Local Swarm Deploy
    needs: [dast-test, swarm-bao-integration]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        shell: powershell
        run: |
          # On utilise l'image du commit pour forcer le Rolling Update
          $repo_owner = "${{ github.repository_owner }}".ToLower()
          $repo_name = "${{ github.event.repository.name }}".ToLower()
          $env:DOCKER_IMAGE = "ghcr.io/$repo_owner/$repo_name:${{ github.sha }}"
          .\manage-swarm.ps1 -Action deploy