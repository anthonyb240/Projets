name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ============================================================
  # Job 0 : Detecter les changements de fichiers Python
  # ============================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    environment: render_api
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements.txt'
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - '.dockerignore'

  # ============================================================
  # Lab 1 : Qualite & Secrets (jobs paralleles)
  # ============================================================

  gitleaks:
    name: Gitleaks - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  trufflehog:
    name: TruffleHog - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          extra_args: --only-verified

  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    environment: render_api
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Installation de flake8
        run: pip install flake8

      - name: Lancement du linting
        run: flake8 . --max-line-length=120 --statistics

  # ============================================================
  # Lab 2 : SAST & SCA
  # ============================================================

  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit

      - name: Installation de Bandit
        run: pip install bandit

      - name: Lancement Bandit
        run: bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git || true

      - name: Sauvegarde du rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep

      - name: Installation de Semgrep
        run: pip install semgrep

      - name: Scan Semgrep (regles par defaut)
        run: semgrep scan --config auto --json --output semgrep-default-report.json . || true

      - name: Scan Semgrep (regles custom - policy as code)
        run: semgrep scan --config .semgrep/custom-rules.yml --json --output semgrep-custom-report.json . || true

      - name: Sauvegarde des rapports Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-default-report.json
            semgrep-custom-report.json

  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit

      - name: Installation de pip-audit
        run: pip install pip-audit

      - name: Scan des dependances
        run: pip-audit -r requirements.txt

  # ============================================================
  # Lab 3 : Docker & Image Security
  # ============================================================

  trivy-fs:
    name: Trivy - Scan pre-build (filesystem)
    runs-on: ubuntu-latest
    environment: render_api
    needs: [sast-bandit, sast-semgrep, sca]
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-fs-report.txt

      - name: Sauvegarde du rapport Trivy FS
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  docker-build-scan:
    name: Docker - Build & Trivy scan image
    runs-on: ubuntu-latest
    environment: render_api
    needs: [trivy-fs, changes]
    if: |
      always() &&
      !contains(needs.trivy-fs.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build \
            --secret id=ctf_flag,src=<(echo "FLAG{test_ci_cd}") \
            --secret id=db_password,src=<(echo "ci_test_password") \
            --secret id=api_key,src=<(echo "ci_test_api_key") \
            -t app-securisee:${{ github.sha }} .

      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "app-securisee:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-image-report.txt

      - name: Sauvegarde du rapport Trivy Image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ============================================================
  # Lab 4 : DAST & Deploy
  # ============================================================

  dast-wapiti:
    name: DAST - Wapiti (via docker-compose)
    runs-on: ubuntu-latest
    environment: render_api
    needs: [docker-build-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Demarrage de l'application via docker-compose
        env:
          CTF_FLAG: "FLAG{ci_test_dast}"
          DB_PASSWORD: "ci_test_password"
          API_KEY: "ci_test_api_key"
          SECRET_KEY: "ci-test-secret-key-for-dast"
        run: |
          docker compose up -d --build
          echo "Attente du demarrage de l'application..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Serveur pret !"
              break
            fi
            echo "Tentative $i/30..."
            sleep 2
          done
          docker compose ps

      - name: Scan DAST avec Wapiti
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports:/reports" \
            cyberwatch/wapiti:latest \
            -u http://localhost:5000 \
            -f html \
            -o /reports/wapiti-report.html \
            --flush-session \
            --scope folder

      - name: Arret des conteneurs
        if: always()
        run: docker compose down -v

      - name: Sauvegarde du rapport Wapiti
        uses: actions/upload-artifact@v4
        with:
          name: wapiti-report
          path: reports/

  # ============================================================
  # Lab 5 : Push Docker + Deploy Render + Health Check & Rollback
  # ============================================================

  docker-push:
    name: Deploy - Push GHCR
    runs-on: ubuntu-latest
    environment: render_api
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build et Push
        run: |
          var_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --secret id=ctf_flag,src=<(echo "${{ secrets.CTF_FLAG }}") \
            --secret id=db_password,src=<(echo "${{ secrets.DB_PASSWORD }}") \
            --secret id=api_key,src=<(echo "${{ secrets.API_KEY }}") \
            -t ghcr.io/${var_repo}:latest \
            -t ghcr.io/${var_repo}:${{ github.sha }} \
            -t ghcr.io/${var_repo}:dev .
          docker push ghcr.io/${var_repo}:latest
          docker push ghcr.io/${var_repo}:${{ github.sha }}
          docker push ghcr.io/${var_repo}:dev

  render-deploy:
    name: Deploy to Render
    needs: docker-push
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - name: Trigger deploy
        run: |
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}" \
            -H "Content-Type: application/json"

  health-check:
    name: Verify & Rollback if needed
    needs: render-deploy
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for deploy to stabilize
        run: |
          echo "Waiting 90s for Render deploy to stabilize..."
          sleep 90

      - name: Check deploy status
        id: check
        run: |
          response=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys?limit=5" \
            -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}")

          current_status=$(echo "$response" | jq -r '.[0].status')
          current_id=$(echo "$response" | jq -r '.[0].id')

          echo "Current deploy ID: $current_id"
          echo "Current deploy status: $current_status"

          # Cherche le dernier deploy "live" different du courant
          previous_live_id=$(echo "$response" | jq -r --arg cid "$current_id" \
            '[.[] | select(.status == "live" and .id != $cid)] | .[0].id // empty')

          echo "Previous live deploy ID: $previous_live_id"

          if [ "$current_status" = "live" ]; then
            echo "Deploy is live"
            echo "rollback=false" >> $GITHUB_OUTPUT
          elif [ -n "$previous_live_id" ]; then
            echo "Deploy failed (status: $current_status) - rollback possible"
            echo "rollback=true" >> $GITHUB_OUTPUT
            echo "previous_sha=$previous_live_id" >> $GITHUB_OUTPUT
          else
            echo "Deploy failed but no previous live deploy to rollback to"
            echo "rollback=false" >> $GITHUB_OUTPUT
          fi

      - name: Health check
        id: health
        run: |
          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://projets-2oho.onrender.com/health" \
            --max-time 15)

          echo "Health check HTTP status: $status_code"

          if [ "$status_code" -eq 200 ]; then
            echo "App is healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "App is unhealthy (HTTP $status_code)"
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Rollback via image SHA
        if: steps.check.outputs.rollback == 'true' || steps.health.outputs.rollback == 'false'
        run: |
          # Recupere le SHA du commit precedent
          PREV_SHA=$(git rev-parse HEAD~1)
          var_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ROLLBACK_IMAGE="ghcr.io/${var_repo}:${PREV_SHA}"

          echo "Current commit: ${{ github.sha }}"
          echo "Rolling back to image: $ROLLBACK_IMAGE"

          # Verifie que l'image existe
          if docker manifest inspect "$ROLLBACK_IMAGE" > /dev/null 2>&1; then
            echo "Image found, triggering rollback deploy on Render..."

            curl -s -w "\nHTTP Status: %{http_code}\n" \
              -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys" \
              -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"imageUrl\": \"${ROLLBACK_IMAGE}\"}"

            echo "Rollback triggered to $ROLLBACK_IMAGE"
          else
            echo "WARNING: Previous image $ROLLBACK_IMAGE not found in registry"
            echo "Cannot rollback - no previous image available"
          fi

          exit 1