name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ============================================================
  # Job 0 : Detecter les changements de fichiers Python##
  # ============================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    environment: render_api
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements.txt'
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - '.dockerignore'

  # ============================================================
  # Lab 1 : Qualite & Secrets (jobs paralleles)
  # ============================================================

  gitleaks:
    name: Gitleaks - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  trufflehog:
    name: TruffleHog - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          extra_args: --only-verified

  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    environment: render_api
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Installation de flake8
        run: pip install flake8

      - name: Lancement du linting
        run: flake8 . --max-line-length=120 --statistics

  # ============================================================
  # Lab 2 : SAST & SCA
  # ============================================================

  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit

      - name: Installation de Bandit
        run: pip install bandit

      - name: Lancement Bandit
        run: bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git,./openbao,./rendered,./instance

      - name: Sauvegarde du rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep

      - name: Installation de Semgrep
        run: pip install semgrep

      - name: Scan Semgrep (regles par defaut)
        run: semgrep scan --config auto --json --output semgrep-default-report.json . || true

      - name: Scan Semgrep (regles custom - policy as code)
        run: semgrep scan --config .semgrep/custom-rules.yml --json --output semgrep-custom-report.json . || true

      - name: Sauvegarde des rapports Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-default-report.json
            semgrep-custom-report.json

  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit

      - name: Installation de pip-audit
        run: pip install pip-audit

      - name: Scan des dependances
        run: pip-audit -r requirements.txt

  # ============================================================
  # Lab 3 : Docker & Image Security
  # ============================================================

  trivy-fs:
    name: Trivy - Scan pre-build (filesystem)
    runs-on: ubuntu-latest
    environment: render_api
    needs: [sast-bandit, sast-semgrep, sca]
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-fs-report.txt

      - name: Sauvegarde du rapport Trivy FS
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  docker-build-scan:
    name: Docker - Build & Trivy scan image
    runs-on: ubuntu-latest
    environment: render_api
    needs: [trivy-fs, changes]
    if: |
      always() &&
      !contains(needs.trivy-fs.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build -t app-securisee:${{ github.sha }} .

      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "app-securisee:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-image-report.txt

      - name: Sauvegarde du rapport Trivy Image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ============================================================
  # Lab 4 : DAST & Deploy
  # ============================================================

  dast-wapiti:
    name: DAST - Wapiti (Simulation Swarm)
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: |
      always() &&
      needs.docker-build-scan.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Build image (tag GHCR name attendu par stack)
        run: |
          docker build -t app-securisee:latest -t ghcr.io/anthonyb240/projets:latest .

      - name: Prepare rendered/app.env (secrets factices DAST)
        run: |
          mkdir -p rendered
          cat > rendered/app.env <<EOF
          FLASK_SECRET_KEY=dast-flask-key-32chars-1234567890
          USERNAME_DB=dast-admin
          PASSWORD_DB=dast-password-only-for-test
          EOF
          chmod -R 777 rendered
          ls -la rendered/

      - name: Initialisation Swarm pour le test DAST
        run: |
          docker swarm init

      - name: Demarrage de l'application via Docker Stack
        run: |
          docker stack deploy -c docker-stack.yml my_app
          docker stack services my_app

          echo "Attente du demarrage..."
          for i in $(seq 1 60); do
            REPLICAS=$(docker service ls --filter name=my_app_app --format "{{.Replicas}}")
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 3 http://127.0.0.1 || echo "000")
            echo "Tentative $i/60 replicas=$REPLICAS http=$HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "Stack pret"
              break
            fi
            sleep 3
          done
          docker service ps my_app_app --no-trunc
          if [ "$HTTP" != "200" ]; then
            docker service logs --no-trunc --tail 50 my_app_nginx 2>&1
            docker service logs --no-trunc --tail 50 my_app_app 2>&1
            exit 1
          fi

      - name: Scan DAST avec Wapiti
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports:/reports" \
            cyberwatch/wapiti:latest \
            -u http://127.0.0.1 \
            -f html \
            -o /reports/wapiti-report.html \
            --flush-session \
            --scope folder

      - name: Arret du stack
        if: always()
        run: docker stack rm my_app

  # ============================================================
  # Lab 5 : Push Docker (Publication sur GHCR)
  # ============================================================

  docker-push:
    name: Build & Push GHCR
    needs: [docker-build-scan]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.docker-build-scan.result == 'success'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build et Push
        run: |
          var_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            -t ghcr.io/${var_repo}:latest \
            -t ghcr.io/${var_repo}:${{ github.sha }} .
          docker push ghcr.io/${var_repo}:latest
          docker push ghcr.io/${var_repo}:${{ github.sha }}

  # ============================================================
  # Lab 6 : Deploy complet (stack Swarm + OpenBao + agent)
  # ============================================================

  swarm-deploy:
    name: Local Swarm Deploy (OpenBao + Stack)
    needs: docker-push
    runs-on: self-hosted
    environment: render_api
    if: |
      always() &&
      needs.docker-push.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image localement (evite pb auth GHCR)
        shell: powershell
        run: |
          docker build -t app-securisee:latest -t "ghcr.io/anthonyb240/projets:latest" .

      - name: Deploy stack
        shell: powershell
        run: .\manage-swarm.ps1 -Action deploy

      - name: Auto-init Bao si premier deploy (dechiffre secrets.enc)
        shell: powershell
        env:
          SECRETS_PASSPHRASE: ${{ secrets.SECRETS_PASSPHRASE }}
        run: |
          if (Test-Path "openbao/.unseal-keys") {
            Write-Host "Bao deja init, skip" -ForegroundColor Green
            exit 0
          }

          if (-not (Test-Path "secrets.enc")) {
            Write-Error "secrets.enc absent. Run .\encrypt-secrets.ps1 local + commit."
            exit 1
          }

          if (-not $env:SECRETS_PASSPHRASE) {
            Write-Error "SECRETS_PASSPHRASE manque dans GitHub Secrets"
            exit 1
          }

          Write-Host "::add-mask::$env:SECRETS_PASSPHRASE"

          # Debug temporaire: comparer ce hash avec ton hash local
          # Hash attendu local:
          # 8a14050bb8d7ee8f3bdd6272fb6bd1201606329e2403200339658f7eb664a0c4
          $sha = [System.Security.Cryptography.SHA256]::Create()
          $bytes = [Text.Encoding]::UTF8.GetBytes($env:SECRETS_PASSPHRASE)
          $hashBytes = $sha.ComputeHash($bytes)
          $secretHash = -join ($hashBytes | ForEach-Object { $_.ToString("x2") })

          Write-Host "SECRETS_PASSPHRASE_SHA256=$secretHash"

          $opensslCandidates = @(
            "openssl",
            "C:\Program Files\Git\usr\bin\openssl.exe",
            "C:\Program Files\OpenSSL-Win64\bin\openssl.exe",
            "C:\Program Files\OpenSSL-Win32\bin\openssl.exe"
          )

          $openssl = $null

          foreach ($candidate in $opensslCandidates) {
            try {
              & $candidate version *> $null
              $openssl = $candidate
              break
            } catch {}
          }

          if (-not $openssl) {
            Write-Error "OpenSSL introuvable. Installe Git for Windows ou OpenSSL sur le runner."
            exit 1
          }

          Write-Host "OpenSSL trouve: $openssl"

          $tmp = [System.IO.Path]::GetTempFileName()

          & $openssl enc -d -aes-256-cbc -pbkdf2 -salt `
            -in secrets.enc `
            -out $tmp `
            -pass "pass:$env:SECRETS_PASSPHRASE"

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Dechiffrement echoue. Passphrase invalide ou secrets.enc incompatible."
            Remove-Item $tmp -Force -ErrorAction SilentlyContinue
            exit 1
          }

          $vars = @{}

          Get-Content $tmp | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              $vars[$matches[1].Trim()] = $matches[2]
              Write-Host "::add-mask::$($matches[2])"
            }
          }

          Remove-Item $tmp -Force

          if (-not $vars['FLASK_SECRET_KEY']) {
            Write-Error "FLASK_SECRET_KEY absent apres dechiffrement."
            exit 1
          }

          if (-not $vars['USERNAME_DB']) {
            Write-Error "USERNAME_DB absent apres dechiffrement."
            exit 1
          }

          if (-not $vars['PASSWORD_DB']) {
            Write-Error "PASSWORD_DB absent apres dechiffrement."
            exit 1
          }

          .\init-bao.ps1 `
            -FlaskSecretKey $vars['FLASK_SECRET_KEY'] `
            -UsernameDb $vars['USERNAME_DB'] `
            -PasswordDb $vars['PASSWORD_DB']

          .\manage-swarm.ps1 -Action deploy

      - name: Status final
        if: always()
        shell: powershell
        run: .\manage-swarm.ps1 -Action status