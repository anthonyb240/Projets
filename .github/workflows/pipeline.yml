name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ============================================================
  # Job 0 : Detecter les changements de fichiers Python
  # ============================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    environment: render_api
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements.txt'
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - '.dockerignore'

  # ============================================================
  # Lab 1 : Qualite & Secrets (jobs paralleles)
  # ============================================================

  gitleaks:
    name: Gitleaks - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  trufflehog:
    name: TruffleHog - Detection de secrets
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          extra_args: --only-verified

  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    environment: render_api
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Installation de flake8
        run: pip install flake8

      - name: Lancement du linting
        run: flake8 . --max-line-length=120 --statistics

  # ============================================================
  # Lab 2 : SAST & SCA
  # ============================================================

  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit

      - name: Installation de Bandit
        run: pip install bandit

      - name: Lancement Bandit
        run: bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git || true

      - name: Sauvegarde du rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep

      - name: Installation de Semgrep
        run: pip install semgrep

      - name: Scan Semgrep (regles par defaut)
        run: semgrep scan --config auto --json --output semgrep-default-report.json . || true

      - name: Scan Semgrep (regles custom - policy as code)
        run: semgrep scan --config .semgrep/custom-rules.yml --json --output semgrep-custom-report.json . || true

      - name: Sauvegarde des rapports Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-default-report.json
            semgrep-custom-report.json

  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment: render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit

      - name: Installation de pip-audit
        run: pip install pip-audit

      - name: Scan des dependances
        run: pip-audit -r requirements.txt

  # ============================================================
  # Lab 3 : Docker & Image Security
  # ============================================================

  trivy-fs:
    name: Trivy - Scan pre-build (filesystem)
    runs-on: ubuntu-latest
    environment: render_api
    needs: [sast-bandit, sast-semgrep, sca]
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-fs-report.txt

      - name: Sauvegarde du rapport Trivy FS
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  docker-build-scan:
    name: Docker - Build & Trivy scan image
    runs-on: ubuntu-latest
    environment: render_api
    needs: [trivy-fs, changes]
    if: |
      always() &&
      !contains(needs.trivy-fs.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build \
            --secret id=ctf_flag,src=<(echo "FLAG{test_ci_cd}") \
            --secret id=db_password,src=<(echo "ci_test_password") \
            --secret id=api_key,src=<(echo "ci_test_api_key") \
            -t app-securisee:${{ github.sha }} .

      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "app-securisee:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-image-report.txt

      - name: Sauvegarde du rapport Trivy Image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ============================================================
  # Lab 4 : DAST & Deploy
  # ============================================================

  dast-wapiti:
    name: DAST - Wapiti (Simulation Swarm)
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --secret id=db_password,src=<(echo "ci_test_password") \
            --secret id=api_key,src=<(echo "ci_test_api_key") \
            -t app-securisee:latest .

      - name: Initialisation Swarm pour le test DAST
        run: |
          docker swarm init || true
          echo "SECRET_KEY=ci-test-key-dast" | docker secret create app_secret_v1 - || true

      - name: Demarrage de l'application via Docker Stack
        run: |
          # On force Swarm a utiliser l'image locale buildée juste au dessus
          export DOCKER_IMAGE=app-securisee:latest
          docker stack deploy -c docker-stack.yml my_app
          
          echo "Attente du demarrage..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost > /dev/null 2>&1; then
              echo "Stack pret"
              break
            fi
            echo "Tentative $i/60..."
            sleep 2
          done
          docker service ps my_app

      - name: Scan DAST avec Wapiti
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports:/reports" \
            cyberwatch/wapiti:latest \
            -u http://localhost \
            -f html \
            -o /reports/wapiti-report.html \
            --flush-session \
            --scope folder

      - name: Arret du stack
        if: always()
        run: docker stack rm my_app

  swarm-bao-integration:
    name: Swarm + OpenBao end-to-end
    runs-on: ubuntu-latest
    needs: [docker-push]
    permissions:
      contents: read
      packages: read
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image from GHCR
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/$REPO:latest
          docker tag ghcr.io/$REPO:latest app-securisee:latest

      - name: Demarrer OpenBao backend
        run: |
          docker compose -f docker-compose.openbao.yml up -d openbao
          for i in $(seq 1 20); do
            curl -sf http://localhost:8200/v1/sys/health > /dev/null && echo "OpenBao up" && exit 0
            sleep 2
          done
          docker logs openbao; exit 1

      - name: Bootstrap OpenBao depuis GitHub Secrets
        env:
          BAO_ADDR: http://127.0.0.1:8200
          BAO_TOKEN: root
          APP_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          APP_API_KEY: ${{ secrets.API_KEY }}
          APP_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Fallback si GitHub Secrets vides (sinon Flask crash sur SECRET_KEY=None)
          : "${APP_SECRET_KEY:=ci-fallback-flask-secret-key-32chars-1234567890}"
          : "${APP_API_KEY:=ci-fallback-api-key}"
          : "${APP_DB_PASSWORD:=ci-fallback-db-password}"

          docker exec -e BAO_ADDR -e BAO_TOKEN openbao \
            bao kv put secret/forum/dev \
              SECRET_KEY="$APP_SECRET_KEY" \
              API_KEY="$APP_API_KEY" \
              DB_PASSWORD="$APP_DB_PASSWORD"

          docker exec -e BAO_ADDR -e BAO_TOKEN openbao bao auth enable approle || true

          docker exec -e BAO_ADDR -e BAO_TOKEN openbao sh -c '
            cat > /tmp/p.hcl <<EOF
          path "secret/data/forum/dev" {
            capabilities = ["read"]
          }
          EOF
            bao policy write forum-read /tmp/p.hcl'

          docker exec -e BAO_ADDR -e BAO_TOKEN openbao \
            bao write auth/approle/role/forum \
              token_policies=forum-read token_ttl=1h token_max_ttl=4h

          ROLE_ID=$(docker exec -e BAO_ADDR -e BAO_TOKEN openbao \
            bao read -field=role_id auth/approle/role/forum/role-id)
          SECRET_ID=$(docker exec -e BAO_ADDR -e BAO_TOKEN openbao \
            bao write -f -field=secret_id auth/approle/role/forum/secret-id)

          mkdir -p openbao rendered
          printf "%s" "$ROLE_ID" > openbao/role_id
          printf "%s" "$SECRET_ID" > openbao/secret_id
          chmod -R 777 rendered

      - name: Demarrer bao-agent
        run: |
          docker compose -f docker-compose.openbao.yml up -d bao-agent
          for i in $(seq 1 20); do
            if [ -s rendered/app.env ]; then
              echo "Fichier rendu OK"
              exit 0
            fi
            echo "Attente render $i/20"
            sleep 2
          done
          docker logs bao-agent; exit 1

      - name: Verifier fichier rendu (sans logger valeurs)
        run: |
          test -s rendered/app.env
          LINES=$(grep -c "=" rendered/app.env)
          BYTES=$(wc -c < rendered/app.env)
          echo "$LINES secrets, $BYTES bytes"
          [ "$LINES" -ge 3 ] || (echo "FAIL: moins de 3 secrets"; exit 1)
          [ "$BYTES" -gt 50 ] || (echo "FAIL: fichier trop petit, valeurs vides?"; cat rendered/app.env | sed 's/=.*/=REDACTED/'; exit 1)

      - name: Init Swarm + deploy stack
        run: |
          docker swarm init || true
          # On definit l'image locale pour le stack
          export DOCKER_IMAGE=app-securisee:latest
          docker stack deploy -c docker-stack.yml my_app

          for i in $(seq 1 90); do
            REPLICAS=$(docker service ls --filter name=my_app_app --format "{{.Replicas}}")
            echo "Tentative $i/90: replicas=$REPLICAS"
            [ "$REPLICAS" = "2/2" ] && echo "Stack up" && break
            sleep 5
          done
          docker service ps my_app_app --no-trunc

      - name: Verifier app via Nginx
        timeout-minutes: 8
        run: |
          # 1. Test app DIRECTEMENT (sans nginx) via docker exec
          echo "=== Test direct app:5000 (depuis conteneur) ==="
          for i in $(seq 1 30); do
            C=$(docker ps -q --filter "name=my_app_app" | head -1)
            if [ -n "$C" ]; then
              CODE=$(docker exec $C python -c "import urllib.request; r=urllib.request.urlopen('http://localhost:5000', timeout=3); print(r.status)" 2>&1 || true)
              echo "Tentative $i/30 direct: $CODE"
              if echo "$CODE" | grep -q "^200$"; then
                echo "App repond direct sur 5000"
                break
              fi
            fi
            sleep 2
          done

          # 2. Diagnostic listener port 80
          echo "=== Listener port 80 ==="
          ss -tlnp 2>&1 | grep -E ":80\b" || echo "Pas de listener port 80"
          docker network ls

          # 3. Test via Nginx (force IPv4 + verbose en cas d'echec)
          echo "=== Test via Nginx 127.0.0.1:80 ==="
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:80 || echo "000")
            echo "Tentative $i/30 nginx: HTTP $HTTP_CODE"
            [ "$HTTP_CODE" = "200" ] && echo "Nginx OK" && exit 0
            sleep 3
          done

          # Diagnostics si echec
          echo "=== Tasks app ==="
          timeout 15 docker service ps my_app_app --no-trunc 2>&1 || echo "timeout"
          echo "=== Logs nginx (priorite) ==="
          timeout 15 docker service logs --no-trunc --tail 50 my_app_nginx 2>&1 || echo "timeout"
          echo "=== Logs app ==="
          timeout 15 docker service logs --no-trunc --tail 100 my_app_app 2>&1 || echo "timeout"
          echo "=== Containers ==="
          docker ps -a
          echo "=== Curl response body ==="
          curl -v http://localhost 2>&1 | head -30 || true
          exit 1

      - name: Verifier aucun secret en env conteneur app
        run: |
          C=$(docker ps -q --filter "name=my_app_app" | head -1)
          LEAK=$(docker exec $C env | grep -E "^(SECRET_KEY|API_KEY|DB_PASSWORD)=" || true)
          if [ -n "$LEAK" ]; then echo "FAIL leak"; echo "$LEAK"; exit 1; fi
          echo "OK aucun secret en env"

      - name: Verifier app lit via Bao
        run: |
          C=$(docker ps -q --filter "name=my_app_app" | head -1)
          docker exec $C python -c "from secrets_manager import get_secret; assert get_secret('API_KEY'), 'API_KEY vide'; print('OK secrets lus')"

      - name: Test rotation Bao sans restart Swarm
        env:
          BAO_ADDR: http://127.0.0.1:8200
          BAO_TOKEN: root
        run: |
          NEW="ROTATED_$(date +%s)"
          docker exec -e BAO_ADDR -e BAO_TOKEN openbao \
            bao kv put secret/forum/dev \
              SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              API_KEY="$NEW" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

          # Agent re-render (10s polling) + TTL loader (15s)
          sleep 25

          C=$(docker ps -q --filter "name=my_app_app" | head -1)
          READ=$(docker exec $C python -c "from secrets_manager import get_secret; print(get_secret('API_KEY'))")
          echo "Lu apres rotation: $READ"
          [ "$READ" = "$NEW" ] || (echo "FAIL rotation"; exit 1)
          echo "OK rotation Bao -> Swarm sans restart"

      - name: Logs en cas d'echec
        if: failure()
        timeout-minutes: 3
        run: |
          echo "=== openbao ==="; timeout 20 docker logs openbao --tail 50 2>&1 || echo "timeout"
          echo "=== bao-agent ==="; timeout 20 docker logs bao-agent --tail 50 2>&1 || echo "timeout"
          echo "=== rendered/app.env ==="; ls -la rendered/ || true
          echo "=== swarm services ==="; timeout 20 docker stack services my_app 2>&1 || echo "timeout"
          echo "=== app tasks ==="; timeout 20 docker service ps my_app_app --no-trunc 2>&1 || echo "timeout"
          echo "=== app logs ==="; timeout 20 docker service logs --no-trunc --tail 100 my_app_app 2>&1 || echo "timeout"

      - name: Cleanup
        if: always()
        run: |
          docker stack rm my_app || true
          sleep 10
          docker compose -f docker-compose.openbao.yml down -v || true
          docker swarm leave --force || true
  # ============================================================
  # Lab 5 : Push Docker (Publication sur GHCR)
  # ============================================================

  docker-push:
    name: Build & Push GHCR
    needs: [docker-build-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build et Push
        run: |
          var_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --secret id=ctf_flag,src=<(echo "${{ secrets.CTF_FLAG }}") \
            --secret id=db_password,src=<(echo "${{ secrets.DB_PASSWORD }}") \
            --secret id=api_key,src=<(echo "${{ secrets.API_KEY }}") \
            -t ghcr.io/${var_repo}:latest \
            -t ghcr.io/${var_repo}:${{ github.sha }} .
          docker push ghcr.io/${var_repo}:latest
          docker push ghcr.io/${var_repo}:${{ github.sha }}
  # Test
  swarm-deploy:
    name: Local Swarm Deploy
    needs: docker-push
    # CE JOB S'EXÉCUTE SUR VOTRE MACHINE LOCALE
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Local Swarm
        shell: powershell
        run: |
          # Utilisation du script local pour mettre à jour le stack
          .\manage-swarm.ps1 -Action deploy