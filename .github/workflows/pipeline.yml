name: CI/CD Security Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  # ============================================================
  # Job 0 : Detecter les changements de fichiers Python
  # (Lab 5 : CI/CD intelligente - ne lancer que si necessaire)
  # ============================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    environment:  render_api
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
              - 'requirements.txt'
            docker:
              - 'Dockerfile'
              - 'requirements.txt'
              - '.dockerignore'

  # ============================================================
  # Lab 1 : Qualite & Secrets (jobs paralleles)
  # ============================================================

  # Job 1a : Detection de secrets avec Gitleaks (+ custom regex)
  gitleaks:
    name: Gitleaks - Detection de secrets
    runs-on: ubuntu-latest
    environment:  render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

  # Job 1b : Detection de secrets avec TruffleHog (alternative)
  trufflehog:
    name: TruffleHog - Detection de secrets
    runs-on: ubuntu-latest
    environment:  render_api
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.63.2
        with:
          extra_args: --only-verified

  # Job 1c : Lint Python avec Flake8
  lint:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    environment:  render_api
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Installation de flake8
        run: pip install flake8

      - name: Lancement du linting
        run: flake8 . --max-line-length=120 --statistics

  # ============================================================
  # Lab 2 : SAST & SCA (paralleles, apres lint)
  # ============================================================

  # Job 2a : SAST avec Bandit
  sast-bandit:
  
    name: SAST - Bandit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment:  render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bandit

      - name: Installation de Bandit
        run: pip install bandit

      - name: Lancement Bandit
        run: bandit -r . -f json -o bandit-report.json --exclude ./.venv,./.git || true

      - name: Sauvegarde du rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # Job 2b : SAST avec Semgrep (bonus Lab 2 + challenge policy-as-code)
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment:  render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-semgrep

      - name: Installation de Semgrep
        run: pip install semgrep

      - name: Scan Semgrep (regles par defaut)
        run: semgrep scan --config auto --json --output semgrep-default-report.json . || true

      - name: Scan Semgrep (regles custom - policy as code)
        run: semgrep scan --config .semgrep/custom-rules.yml --json --output semgrep-custom-report.json . || true

      - name: Sauvegarde des rapports Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-reports
          path: |
            semgrep-default-report.json
            semgrep-custom-report.json

  # Job 2c : SCA avec pip-audit
  sca:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    needs: [lint, changes]
    environment:  render_api
    if: needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-audit

      - name: Installation de pip-audit
        run: pip install pip-audit

      - name: Scan des dependances
        run: pip-audit -r requirements.txt

  # ============================================================
  # Lab 3 : Docker & Image Security
  # ============================================================

  # Job 3a : Scan pre-build du Dockerfile avec Trivy (filesystem)
  trivy-fs:
    name: Trivy - Scan pre-build (filesystem)
    runs-on: ubuntu-latest
    environment:  render_api
    needs: [sast-bandit, sast-semgrep, sca]
    if: |
      always() &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Scan filesystem avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "./"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-fs-report.txt

      - name: Sauvegarde du rapport Trivy FS
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  # Job 3b : Build Docker + Scan image avec Trivy (post-build)
  docker-build-scan:
    name: Docker - Build & Trivy scan image
    runs-on: ubuntu-latest
    environment:  render_api
    needs: [trivy-fs, changes]
    if: |
      always() &&
      !contains(needs.trivy-fs.result, 'failure')
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build \
            --secret id=ctf_flag,src=<(echo "FLAG{test_ci_cd}") \
            --secret id=db_password,src=<(echo "ci_test_password") \
            --secret id=api_key,src=<(echo "ci_test_api_key") \
            -t app-securisee:${{ github.sha }} .

      - name: Scan image Docker avec Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "app-securisee:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          output: trivy-image-report.txt

      - name: Sauvegarde du rapport Trivy Image
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

  # ============================================================
  # Lab 4 : DAST & Deploy
  # ============================================================

  # Job 4a : DAST avec Wapiti via docker-compose
  dast-wapiti:
    name: DAST - Wapiti (via docker-compose)
    runs-on: ubuntu-latest
    environment:  render_api
    needs: [docker-build-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Demarrage de l'application via docker-compose
        env:
          CTF_FLAG: "FLAG{ci_test_dast}"
          DB_PASSWORD: "ci_test_password"
          API_KEY: "ci_test_api_key"
          SECRET_KEY: "ci-test-secret-key-for-dast"
        run: |
          docker compose up -d --build
          echo "Attente du demarrage de l'application..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Serveur pret !"
              break
            fi
            echo "Tentative $i/30..."
            sleep 2
          done
          docker compose ps

      - name: Scan DAST avec Wapiti
        run: |
          mkdir -p reports
          docker run --rm --network host \
            -v "${{ github.workspace }}/reports:/reports" \
            cyberwatch/wapiti:latest \
            -u http://localhost:5000 \
            -f html \
            -o /reports/wapiti-report.html \
            --flush-session \
            --scope folder

      - name: Arret des conteneurs
        if: always()
        run: docker compose down -v

      - name: Sauvegarde du rapport Wapiti
        uses: actions/upload-artifact@v4
        with:
          name: wapiti-report
          path: reports/

  # Job 4b : Push vers DockerHubsa
  docker-push:
    name: Deploy - Push DockerHub
    runs-on: ubuntu-latest
    environment:  render_api
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build et Push
        run: |
          var_repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --secret id=ctf_flag,src=<(echo "${{ secrets.CTF_FLAG }}") \
            --secret id=db_password,src=<(echo "${{ secrets.DB_PASSWORD }}") \
            --secret id=api_key,src=<(echo "${{ secrets.API_KEY }}") \
            -t ghcr.io/${var_repo}:latest . \
            -t ghcr.io/${var_repo}:${{ github.sha }} \
            -t ghcr.io/${var_repo}:dev
          docker push ghcr.io/${var_repo}:latest
          docker push ghcr.io/${var_repo}:${{ github.sha }}
          docker push ghcr.io/${var_repo}:dev

  render-deploy:
    name: Deploy to Render
    needs: docker-push
    runs-on: ubuntu-latest
    environment:  render_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger deploy
        run: |
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.render.com/v1/services/${{secrets.RENDER_SERVICE}}/deploys" \
            -H "Authorization: Bearer ${{secrets.RENDER_KEY}}" \
            -H "Content-Type: application/json"


  health-check:
    name: Verify & Rollback if needed
    needs: render-deploy
    runs-on: ubuntu-latest
    environment: render_api
    steps:
      - name: Check deploy status
        id: check
        run: |
          # Récupère le dernier deploy
          response=$(curl -s \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys?limit=2" \
            -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}")

          current_status=$(echo "$response" | jq -r '.[0].status')
          previous_deploy_id=$(echo "$response" | jq -r '.[1].id')

          echo "Current deploy status: $current_status"
          echo "Previous deploy ID: $previous_deploy_id"

          if [ "$current_status" = "live" ]; then
            echo "Deploy OK"
            echo "rollback=false" >> $GITHUB_OUTPUT
          else
            echo "Deploy failed or unhealthy (status: $current_status)"
            echo "rollback=true" >> $GITHUB_OUTPUT
            echo "previous_id=$previous_deploy_id" >> $GITHUB_OUTPUT
          fi

      - name: Health check endpoint
        if: steps.check.outputs.rollback == 'false'
        id: health
        run: |
          # Remplace par ton URL Render
          status_code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ton-service.onrender.com/health" \
            --max-time 10)

          echo "Health check HTTP status: $status_code"

          if [ "$status_code" -ne 200 ]; then
            echo "Health check failed"
            echo "rollback=true" >> $GITHUB_OUTPUT

            # Récupère l'ID du deploy précédent
            response=$(curl -s \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys?limit=2" \
              -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}")
            previous_id=$(echo "$response" | jq -r '.[1].id')
            echo "previous_id=$previous_id" >> $GITHUB_OUTPUT
          else
            echo "rollback=false" >> $GITHUB_OUTPUT
          fi

      - name: Rollback
        if: steps.check.outputs.rollback == 'true' || steps.health.outputs.rollback == 'true'
        run: |
          PREVIOUS_ID="${{ steps.check.outputs.previous_id }}${{ steps.health.outputs.previous_id }}"

          echo "Rolling back to deploy: $PREVIOUS_ID"

          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE }}/deploys/$PREVIOUS_ID/rollback" \
            -H "Authorization: Bearer ${{ secrets.RENDER_KEY }}" \
            -H "Content-Type: application/json"

          echo "Rollback triggered"
          exit 1