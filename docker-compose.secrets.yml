services:
  # ──────────────────────────────────────────────────────────
  # Infisical Vault stack (backend + DB + redis)
  # ──────────────────────────────────────────────────────────
  infisical-db:
    image: postgres:14-alpine
    container_name: infisical-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: infisical
      POSTGRES_PASSWORD: infisical
      POSTGRES_DB: infisical
    volumes:
      - infisical-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 5s
      timeout: 3s
      retries: 10

  infisical-redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    command: ["redis-server", "--save", ""]

  infisical-backend:
    image: infisical/infisical:latest-postgres
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:-6c1fe4e407b8911c104518103505b218}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:-5lrMXKKWCVocS/uerPsl7V+TX/aaUaI7iDGNJwYyMc8=}
      DB_CONNECTION_URI: postgres://infisical:infisical@infisical-db:5432/infisical
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: http://localhost:8080
      TELEMETRY_ENABLED: "false"
    ports:
      - "8080:8080"

  # ──────────────────────────────────────────────────────────
  # Infisical Agent — sidecar qui rend les secrets sur volume
  # ──────────────────────────────────────────────────────────
  infisical-agent:
    image: infisical/cli:latest
    container_name: infisical-agent
    restart: unless-stopped
    depends_on:
      infisical-backend:
        condition: service_started
    environment:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
    volumes:
      - ./infisical/agent-config.yaml:/etc/infisical/agent.yaml:ro
      - ./infisical/app.env.tmpl:/etc/infisical/app.env.tmpl:ro
      - app-secrets:/run/secrets-rendered
    command: ["agent", "--config", "/etc/infisical/agent.yaml"]

  # ──────────────────────────────────────────────────────────
  # App — lit les secrets depuis le volume, pas depuis env
  # ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: app-securisee:latest
    container_name: forum-app-bonus
    depends_on:
      infisical-agent:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      SECRETS_FILE: /run/secrets-rendered/app.env
      SECRETS_TTL: "15"
      SQLALCHEMY_DATABASE_URI: sqlite:///forum.db
    volumes:
      - app-secrets:/run/secrets-rendered:ro
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  infisical-db-data:
  app-secrets:
